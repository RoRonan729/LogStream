<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogStream - Rokingdom</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #1a1a2e;
      --bg-secondary:  #16213e;
      --bg-tertiary:   #0f1525;
      --bg-input:      #0d1117;
      --border:        #2a2a4a;
      --border-focus:  #55FF55;
      --accent:        #55FF55;
      --accent-dim:    #33aa33;
      --text:          #c8d6e5;
      --text-muted:    #636e7b;
      --warn:          #FFAA00;
      --error:         #FF5555;
      --info:          #AAAAAA;
      --font-mono:     'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Layout Shell ────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(85, 255, 85, 0.35);
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: none;
      text-shadow: none;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .status-badge.connected {
      border-color: rgba(85, 255, 85, 0.25);
      background: rgba(85, 255, 85, 0.06);
    }

    .status-badge.connected .status-dot {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(85, 255, 85, 0.6);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 4px rgba(85, 255, 85, 0.4); }
      50%       { box-shadow: 0 0 12px rgba(85, 255, 85, 0.8); }
    }

    .status-text {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.connected .status-text {
      color: var(--accent);
    }

    /* ── Settings Bar ────────────────────────────────────────────── */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .settings-bar label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    .settings-bar input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .settings-bar input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(85, 255, 85, 0.12);
    }

    .settings-bar input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    #ws-url   { width: 280px; }
    #ws-token { width: 180px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--text);
      flex-shrink: 0;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-connect {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .btn-connect:hover {
      background: rgba(85, 255, 85, 0.1);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(85, 255, 85, 0.15);
    }

    .btn-disconnect {
      border-color: rgba(255, 85, 85, 0.4);
      color: var(--error);
    }

    .btn-disconnect:hover {
      background: rgba(255, 85, 85, 0.1);
      border-color: var(--error);
    }

    .settings-spacer {
      flex: 1;
    }

    .reconnect-notice {
      font-size: 11px;
      color: var(--warn);
      display: none;
      align-items: center;
      gap: 6px;
      animation: blink-text 1.5s ease-in-out infinite;
    }

    .reconnect-notice.visible {
      display: flex;
    }

    @keyframes blink-text {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Log Display ─────────────────────────────────────────────── */
    .log-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    #log-output {
      height: 100%;
      overflow-y: auto;
      padding: 8px 0;
      scroll-behavior: auto;
    }

    /* Custom scrollbar */
    #log-output::-webkit-scrollbar {
      width: 8px;
    }

    #log-output::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
    }

    #log-output::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    #log-output::-webkit-scrollbar-thumb:hover {
      background: #3a3a5a;
    }

    .log-line {
      padding: 1px 20px;
      line-height: 1.65;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px solid transparent;
      transition: background 0.15s ease;
    }

    .log-line:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .log-line.level-info {
      color: var(--info);
    }

    .log-line.level-warn {
      color: var(--warn);
      border-left-color: rgba(255, 170, 0, 0.4);
    }

    .log-line.level-warn:hover {
      background: rgba(255, 170, 0, 0.04);
    }

    .log-line.level-error {
      color: var(--error);
      border-left-color: rgba(255, 85, 85, 0.5);
      background: rgba(255, 85, 85, 0.03);
    }

    .log-line.level-error:hover {
      background: rgba(255, 85, 85, 0.06);
    }

    .log-line.level-system {
      color: var(--accent);
      font-style: italic;
      border-left-color: rgba(85, 255, 85, 0.3);
    }

    .log-timestamp {
      color: #4a5568;
      margin-right: 4px;
      user-select: none;
    }

    .log-level-tag {
      font-weight: 700;
      margin-right: 2px;
    }

    .log-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
      flex-direction: column;
      gap: 8px;
      user-select: none;
      opacity: 0.6;
    }

    .log-empty .empty-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 12px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .line-count {
      color: var(--text-muted);
    }

    .line-count strong {
      color: var(--text);
      font-weight: 600;
    }

    .btn-clear {
      padding: 4px 14px;
      font-size: 11px;
    }

    .btn-clear:hover {
      border-color: var(--error);
      color: var(--error);
      background: rgba(255, 85, 85, 0.08);
    }

    /* Toggle switch */
    .toggle-group {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-group span {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle-track {
      width: 34px;
      height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s ease;
    }

    .toggle-track.active {
      background: var(--accent-dim);
    }

    .toggle-knob {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s ease;
    }

    .toggle-track.active .toggle-knob {
      transform: translateX(16px);
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .settings-bar { padding: 8px 12px; gap: 8px; }
      #ws-url   { width: 100%; order: 1; }
      #ws-token { width: 100%; order: 2; }
      .settings-bar label { display: none; }
      .btn-connect-wrap { order: 3; width: 100%; }
      .btn-connect-wrap .btn { width: 100%; justify-content: center; }
      .settings-spacer { display: none; }
      .reconnect-notice { order: 4; width: 100%; justify-content: center; }
      header { padding: 10px 14px; }
      .log-line { padding: 1px 12px; font-size: 12px; }
      footer { padding: 8px 12px; flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <div class="header-left">
        <div class="logo">LogStream <span>by Rokingdom</span></div>
      </div>
      <div class="status-badge" id="status-badge">
        <div class="status-dot"></div>
        <span class="status-text" id="status-text">Disconnected</span>
      </div>
    </header>

    <!-- Settings Bar -->
    <div class="settings-bar">
      <label for="ws-url">Server</label>
      <input type="text" id="ws-url" placeholder="ws://localhost:8085" value="ws://localhost:8085" spellcheck="false" autocomplete="off" />

      <label for="ws-token">Token</label>
      <input type="password" id="ws-token" placeholder="Auth token (optional)" autocomplete="off" />

      <div class="btn-connect-wrap">
        <button class="btn btn-connect" id="btn-toggle" onclick="toggleConnection()">Connect</button>
      </div>

      <div class="settings-spacer"></div>

      <div class="reconnect-notice" id="reconnect-notice">
        Reconnecting...
      </div>
    </div>

    <!-- Log Output -->
    <div class="log-container">
      <div id="log-output">
        <div class="log-empty" id="log-empty">
          <div class="empty-icon">></div>
          <div>Waiting for connection...</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-left">
        <span class="line-count"><strong id="line-count">0</strong> lines</span>
        <button class="btn btn-clear" onclick="clearLog()">Clear</button>
      </div>
      <div class="footer-right">
        <div class="toggle-group" onclick="toggleAutoScroll()">
          <span>Auto-scroll</span>
          <div class="toggle-track active" id="autoscroll-track">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────
    let ws = null;
    let autoScroll = true;
    let lineCount = 0;
    let reconnectTimer = null;
    let intentionalClose = false;
    const MAX_LINES = 500;

    // ── DOM refs ──────────────────────────────────────────────────
    const logOutput      = document.getElementById('log-output');
    const logEmpty       = document.getElementById('log-empty');
    const lineCountEl    = document.getElementById('line-count');
    const statusBadge    = document.getElementById('status-badge');
    const statusText     = document.getElementById('status-text');
    const btnToggle      = document.getElementById('btn-toggle');
    const wsUrlInput     = document.getElementById('ws-url');
    const wsTokenInput   = document.getElementById('ws-token');
    const autoscrollTrack = document.getElementById('autoscroll-track');
    const reconnectNotice = document.getElementById('reconnect-notice');

    // ── Connection ────────────────────────────────────────────────
    function toggleConnection() {
      if (ws && ws.readyState <= WebSocket.OPEN) {
        disconnect();
      } else {
        connect();
      }
    }

    function connect() {
      const url = wsUrlInput.value.trim();
      if (!url) {
        wsUrlInput.focus();
        return;
      }

      intentionalClose = false;
      clearReconnectTimer();

      try {
        ws = new WebSocket(url);
      } catch (e) {
        addSystemLine('Failed to create WebSocket: ' + e.message);
        return;
      }

      setConnecting();

      ws.onopen = function () {
        setConnected();
        addSystemLine('Connected to ' + url);

        // Send auth token as first message if provided
        const token = wsTokenInput.value.trim();
        if (token) {
          ws.send(token);
        }
      };

      ws.onmessage = function (event) {
        const data = event.data;
        // Handle both single lines and multi-line payloads
        const lines = data.split('\n');
        for (const line of lines) {
          if (line.length > 0) {
            addLogLine(line);
          }
        }
      };

      ws.onclose = function (event) {
        setDisconnected();
        if (!intentionalClose) {
          addSystemLine('Connection lost (code ' + event.code + '). Reconnecting in 5s...');
          scheduleReconnect();
        } else {
          addSystemLine('Disconnected.');
        }
        ws = null;
      };

      ws.onerror = function () {
        // The onclose handler will fire after this, so we just log here
        addSystemLine('WebSocket error occurred.');
      };
    }

    function disconnect() {
      intentionalClose = true;
      clearReconnectTimer();
      if (ws) {
        ws.close();
        ws = null;
      }
      setDisconnected();
    }

    // ── Reconnection ──────────────────────────────────────────────
    function scheduleReconnect() {
      clearReconnectTimer();
      reconnectNotice.classList.add('visible');
      reconnectTimer = setTimeout(function () {
        reconnectNotice.classList.remove('visible');
        addSystemLine('Attempting reconnect...');
        connect();
      }, 5000);
    }

    function clearReconnectTimer() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      reconnectNotice.classList.remove('visible');
    }

    // ── UI State Updates ──────────────────────────────────────────
    function setConnecting() {
      statusText.textContent = 'Connecting';
      statusBadge.classList.remove('connected');
      btnToggle.textContent = 'Connecting...';
      btnToggle.className = 'btn btn-disconnect';
      btnToggle.disabled = true;
      wsUrlInput.disabled = true;
      wsTokenInput.disabled = true;
    }

    function setConnected() {
      statusText.textContent = 'Connected';
      statusBadge.classList.add('connected');
      btnToggle.textContent = 'Disconnect';
      btnToggle.className = 'btn btn-disconnect';
      btnToggle.disabled = false;
      wsUrlInput.disabled = true;
      wsTokenInput.disabled = true;
    }

    function setDisconnected() {
      statusText.textContent = 'Disconnected';
      statusBadge.classList.remove('connected');
      btnToggle.textContent = 'Connect';
      btnToggle.className = 'btn btn-connect';
      btnToggle.disabled = false;
      wsUrlInput.disabled = false;
      wsTokenInput.disabled = false;
    }

    // ── Log Line Handling ─────────────────────────────────────────
    function classifyLevel(text) {
      // Match common Minecraft / Java log formats:
      //   [12:34:56 WARN]: ...
      //   [12:34:56 ERROR]: ...
      //   [12:34:56 INFO]: ...
      //   or just WARN / ERROR / INFO anywhere early in the line
      const upper = text.substring(0, 120).toUpperCase();
      if (/\bERROR\b|SEVERE\b/.test(upper))  return 'error';
      if (/\bWARN\b|WARNING\b/.test(upper))   return 'warn';
      return 'info';
    }

    function formatLogLine(raw) {
      const level = classifyLevel(raw);

      const el = document.createElement('div');
      el.className = 'log-line level-' + level;

      // Try to extract a timestamp like [HH:MM:SS] or [HH:MM:SS INFO] etc.
      const tsMatch = raw.match(/^(\[[\d:]+)/);
      if (tsMatch) {
        const tsSpan = document.createElement('span');
        tsSpan.className = 'log-timestamp';
        tsSpan.textContent = tsMatch[1];
        el.appendChild(tsSpan);

        const rest = document.createTextNode(raw.substring(tsMatch[1].length));
        el.appendChild(rest);
      } else {
        el.textContent = raw;
      }

      return el;
    }

    function addLogLine(text) {
      hideEmpty();

      const el = formatLogLine(text);
      logOutput.appendChild(el);
      lineCount++;

      // Enforce max lines
      while (lineCount > MAX_LINES) {
        const first = logOutput.querySelector('.log-line, .log-line-system');
        if (first) {
          logOutput.removeChild(first);
          lineCount--;
        } else {
          break;
        }
      }

      updateLineCount();
      scrollIfNeeded();
    }

    function addSystemLine(text) {
      hideEmpty();

      const el = document.createElement('div');
      el.className = 'log-line level-system log-line-system';
      el.textContent = '>> ' + text;
      logOutput.appendChild(el);
      lineCount++;

      // Enforce max lines
      while (lineCount > MAX_LINES) {
        const first = logOutput.querySelector('.log-line, .log-line-system');
        if (first) {
          logOutput.removeChild(first);
          lineCount--;
        } else {
          break;
        }
      }

      updateLineCount();
      scrollIfNeeded();
    }

    function hideEmpty() {
      if (logEmpty) {
        logEmpty.style.display = 'none';
      }
    }

    function updateLineCount() {
      lineCountEl.textContent = lineCount;
    }

    function scrollIfNeeded() {
      if (autoScroll) {
        logOutput.scrollTop = logOutput.scrollHeight;
      }
    }

    // ── Controls ──────────────────────────────────────────────────
    function clearLog() {
      // Remove all log lines but keep the empty state element
      const lines = logOutput.querySelectorAll('.log-line, .log-line-system');
      lines.forEach(function (el) { el.remove(); });
      lineCount = 0;
      updateLineCount();
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        logEmpty.style.display = '';
      }
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      if (autoScroll) {
        autoscrollTrack.classList.add('active');
        scrollIfNeeded();
      } else {
        autoscrollTrack.classList.remove('active');
      }
    }

    // Allow pressing Enter in URL or token fields to connect
    wsUrlInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') toggleConnection();
    });
    wsTokenInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') toggleConnection();
    });
  </script>
</body>
</html>
